<!DOCTYPE html>
<html>
<head>
    <title>Employee Login - ASP Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <span class="logo-icon">🏦</span>
        ASP Bank
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
    </div>
</nav>

<div class="container">
    <h2>Employee Login</h2>

    <form onsubmit="return validateEmployeeLogin()">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <a href="index.html">Back</a>
</div>

<script src="auth.js" defer></script>
<script>
function validateEmployeeLogin() {
    // Load auth first
    if (typeof auth === 'undefined') {
        const script = document.createElement('script');
        script.src = 'auth.js';
        document.head.appendChild(script);
        script.onload = () => {
            auth.updateNavbar();
            performEmployeeLogin();
        };
        return false;
    }
    auth.updateNavbar();
    performEmployeeLogin();
    return false;
}

function performEmployeeLogin() {
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;

    // Email validation
    let emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;
    if (!emailPattern.test(email)) {
        alert("Invalid email format");
        return false;
    }

    if(password.length < 6){
        alert("Password must be at least 6 characters");
        return false;
    }

    try {
        const result = auth.login(email, password, 'employee');
        // Show styled success message
        showSuccessMessage("Employee Login successful.");
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    } catch (error) {
        alert(error.message || "Login failed");
    }
}

function showSuccessMessage(message) {
    const popup = document.createElement('div');
    popup.className = 'popup';
    popup.style.display = 'flex';
    popup.innerHTML = `
        <div class="popup-content">
            <h2 style="color: #28a745;">✓ ${message}</h2>
        </div>
    `;
    document.body.appendChild(popup);
}
</script>
</body>
</html>
