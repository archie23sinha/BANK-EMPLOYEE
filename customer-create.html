<!DOCTYPE html>
<html>
<head>
    <title>Customer Registration - US001</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <span class="logo-icon">🏦</span>
        ASP Bank
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
    </div>
</nav>

<div class="container">
    <h2>Customer Registration</h2>

    <form onsubmit="return validateCustomer()">
        <div id="successPopup" class="popup" style="display: none;">
            <div class="popup-content">
                <h2 style="color: #28a745; font-size: 20px;">✓ Customer Registration successful.</h2>
                <div id="popupDetails" style="text-align: left; font-size: 16px; font-weight: bold;"></div>
            </div>
        </div>

        <input type="text" id="ssn" placeholder="Customer SSN Id (9 digits)" maxlength="9" required>
        <input type="text" id="name" placeholder="Customer Name (max 50 chars)" maxlength="50" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password (8-30 chars, must include uppercase, lowercase, number, special char)" maxlength="30" required oninput="checkPasswordStrength()">
        <div id="passwordStrength" class="password-strength" style="display: none;">
            <div class="strength-bar">
                <div id="strengthFill" class="strength-fill"></div>
            </div>
            <div id="strengthText" class="strength-text"></div>
        </div>
        <input type="password" id="confirmPassword" placeholder="Confirm Password (8-30 chars, must include uppercase, lowercase, number, special char)" maxlength="30" required>
        <textarea id="address" placeholder="Address (max 100 chars)" maxlength="100" required></textarea>
        <input type="text" id="contact" placeholder="Contact Number (10 digits)" maxlength="10" required>

        <button type="submit">Register</button>
    </form>

    <a href="index.html">Back</a>
</div>

<script src="auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    if (typeof auth !== 'undefined') {
        // Don't update navbar on registration page
    } else {
        alert('Auth not loaded');
    }

    // Add input validation for numeric fields
    document.getElementById('ssn').addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '').substring(0, 9);
    });

    document.getElementById('contact').addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '').substring(0, 10);
    });
});
</script>
<script src="customer.js"></script>
</body>
</html>
