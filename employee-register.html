<!DOCTYPE html>
<html>
<head>
    <title>Employee Register - ASP Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <h2>ASP Bank</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="customer-login.html">Login</a>
        <a href="customer-create.html">Customer</a>
    </div>
</nav>

<!-- Form Container -->
<div class="container">
    <h2>Employee Registration</h2>

    <form onsubmit="return validateEmployee()">

        <!-- Employee ID -->
        <label>Employee ID</label>
        <input type="text" id="empId" readonly>

        <!-- First Name -->
        <label>First Name</label>
        <input type="text" id="fname" placeholder="Enter First Name">
        <div class="error" id="fnameError"></div>

        <!-- Last Name -->
        <label>Last Name</label>
        <input type="text" id="lname" placeholder="Enter Last Name">
        <div class="error" id="lnameError"></div>

        <!-- Email -->
        <label>Email</label>
        <input type="email" id="email" placeholder="example@gmail.com">
        <div class="error" id="emailError"></div>

        <!-- Password -->
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password">
        <div class="error" id="passwordError"></div>

        <!-- Confirm Password -->
        <label>Confirm Password</label>
        <input type="password" id="cpassword" placeholder="Re-enter Password">
        <div class="error" id="cpasswordError"></div>

        <!-- Address -->
        <label>Address</label>
        <textarea id="address" placeholder="Enter Address"></textarea>
        <div class="error" id="addressError"></div>

        <!-- Contact Number with +91 -->
        <label>Contact Number</label>
        <div style="display:flex;">
            <span style="padding:10px;background:#ddd;border-radius:5px 0 0 5px;">+91</span>
            <input type="text" id="contact" placeholder="Enter 10 digit number" style="border-radius:0 5px 5px 0;">
        </div>
        <div class="error" id="contactError"></div>

        <!-- Submit -->
        <button type="submit">Register</button>

    </form>

    <a href="index.html">Back</a>
</div>

<!-- JS -->
<script src="employee.js"></script>

</body>
</html>
